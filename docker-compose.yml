services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  data-loader:
    build:
      context: .
      dockerfile: Dockerfile
    command: python scripts/data_loader.py
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./supabase:/app/supabase
